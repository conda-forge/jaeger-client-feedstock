context:
  name: jaeger-client
  version: 4.8.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  md5: 574b0f3f16f1afc80a12a1e8c438275a

build:
  number: 4
  noarch: python
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python ${{ python_min }}.*
    - setuptools
    - pip
  run:
    - python >=${{ python_min }}
    - threadloop >=1,<2
    - opentracing >=2.1,<3.0
    - thrift
    - tornado >=4.3
    # uses fcntl module, which is not on windows.
    #    see https://stackoverflow.com/questions/1422368/fcntl-substitute-on-windows for potential substitute.
    # can't be noarch because of windows incompatbility
    - __unix

tests:
  - python:
      imports:
        - jaeger_client
      python_version: ${{ python_min }}.*

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Jaeger Python OpenTracing Tracer implementation
  homepage: https://github.com/uber/jaeger-client-python

extra:
  recipe-maintainers:
    - baszalmstra
    - msarahan
    - scopatz
