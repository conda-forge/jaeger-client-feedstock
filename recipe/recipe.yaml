context:
  name: jaeger-client
  version: 4.8.0

package:
  name: ${{ name }}
  version: ${{ version }}

source:
  url: https://pypi.io/packages/source/${{ name[0] }}/${{ name }}/${{ name }}-${{ version }}.tar.gz
  md5: 574b0f3f16f1afc80a12a1e8c438275a
  file_name: ${{ name }}-${{ version }}.tar.gz

build:
  # uses fcntl module, which is not on windows.
  #    see https://stackoverflow.com/questions/1422368/fcntl-substitute-on-windows for potential substitute.
  # can't be noarch because of windows incompatbility
  number: 3
  skip: win
  script: ${{ PYTHON }} -m pip install . --no-deps --ignore-installed -vv

requirements:
  host:
    - python
    - pip
  run:
    - python
    - threadloop >=1,<2
    - opentracing >=2.1,<3.0
    - thrift
    - tornado >=4.3

tests:
  - python:
      imports:
        - jaeger_client
      pip_check: false

about:
  license: Apache-2.0
  license_file: LICENSE
  summary: Jaeger Python OpenTracing Tracer implementation
  homepage: https://github.com/uber/jaeger-client-python

extra:
  recipe-maintainers:
    - baszalmstra
    - msarahan
    - scopatz
